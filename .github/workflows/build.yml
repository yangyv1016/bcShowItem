name: Build & Release

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:          # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write      # 创建 Release 需要

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        env:
          # tag 触发时把 tag 名（如 v1.0.4，去掉前缀 v）作为版本传给构建，使 jar 名随版本更新；
          # 非 tag 触发时该变量为空，构建回退到 pom.xml 里的默认 revision。
          PLUGIN_VERSION: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '' }}
        run: |
          if [ -n "$PLUGIN_VERSION" ]; then
            mvn -B clean package -Drevision="${PLUGIN_VERSION#v}"
          else
            mvn -B clean package
          fi

      - name: Verify jar
        run: ls -lh target/*.jar

      # tag push 时自动创建 GitHub Release
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: target/BcShowItem-*.jar
          fail_on_unmatched_files: true

      # 常规 push 上传 jar 作为 Artifact
      - name: Upload Artifact
        if: "!startsWith(github.ref, 'refs/tags/v')"
        uses: actions/upload-artifact@v4
        with:
          name: BcShowItem-${{ github.ref_name }}
          path: target/BcShowItem-*.jar
          if-no-files-found: error