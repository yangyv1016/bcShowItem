# ============================================================
#  BcShowItem  -  在 VentureChat 聊天中嵌入装备栏/快捷栏物品
# ============================================================
#  玩家在聊天中输入触发符（默认 %i），会被替换为 [物品名]，
#  鼠标悬停时展示与背包中完全一致的物品信息界面。
#
#  工作原理（无状态、跨服安全、优雅降级）：
#    发送端： %i → [物品名] + 一段「零宽不可见字符」编码的物品数据
#    渲染端： ProtocolLib 拦截聊天出站包 → 还原为物品 hover 组件
#
#  物品数据用「零宽字符」随消息文本一起传输：
#    - 装了本插件的子服：还原成彩色 [物品名] + 悬停界面
#    - 没装本插件的子服：零宽字符不可见，玩家只看到干净的 [物品名] 纯文本
#      （不会出现乱码）
#  ⚠️ 因此建议所有子服都安装本插件，接收端才能显示悬停效果。
# ============================================================

# ---------- 触发符 ----------
# 触发符 = 前缀 + selector (+ 后缀)。常见组合：
#   trigger-prefix: "%"  trigger-suffix: ""   ->  %i   %3        (前缀式，推荐)
#   trigger-prefix: "["  trigger-suffix: "]"  ->  [i]  [3]       (包裹式)
#   trigger-prefix: "{"  trigger-suffix: "}"  ->  {i}  {3}
trigger-prefix: "%"
trigger-suffix: ""

# selector 可用值：
#   i / hand / 手        当前手持格（主手，随选中的快捷栏格移动）
#   1 ~ 9                快捷栏第 N 格
#   offhand / 副手       副手
#   head / chest / legs / feet （头/胸/腿/脚）  对应护甲槽
#   也支持冒号写法：%i:head、%i:副手

# 是否启用快捷栏数字 selector（%1 ~ %9）。
hotbar-enabled: true

# 是否启用装备槽 selector（%i:head 等）。关闭后只保留手持格与快捷栏数字。
slot-syntax-enabled: true

# ---------- 展示 ----------
# 聊天栏中物品的展示文本格式。占位符：
#   {name}   物品显示名（含数量后缀，若开启）
#   {amount} 数量
#   {type}   物品类型 ID (如 diamond_sword)
display-format: "&b[{name}]&r"

# 悬停内容模式：控制鼠标悬停时展示什么，直接影响传输体积。
#   auto  自动降级链（推荐，默认）：完整 NBT 装得下就用；超出体积预算时自动退到
#         「物品名 + lore」文本悬停；仍超预算才退到纯文本。既尽量保留最丰富的悬停，
#         又绝不因体积踢人。—— 服里大小 NBT 混杂时，用这个最省心。
#   full  强制携带完整物品 NBT，悬停与背包完全一致（附魔/耐久/自定义数据全有）。
#         超预算直接降级纯文本（不会退到 text 档）。
#   text  强制只携带「物品名 + lore 介绍」文本。体积小，悬停里只有名字和 lore，
#         没有附魔行/耐久等原生 tooltip 细节。
hover-mode: "auto"

# 被展示的槽位为空时（如空手打 %i）的处理方式：
#   keep    原样保留触发符文本（如 %i 就显示 %i），当普通聊天内容。默认，最不打扰。
#   text    替换为下面的 empty-slot-text 占位文本（如 [空]）。
#   remove  直接删掉该触发符，什么都不留。
empty-slot-action: "keep"

# 仅当 empty-slot-action=text 时生效：空槽位替换成的占位文本。
empty-slot-text: "&7[空]"

# 是否在物品名后附带数量后缀 (x64)。
show-amount-suffix: true

# ---------- 限制（防止撑爆数据包上限而踢人）----------
# 物品数据以「零宽字符」编入消息，会随 VentureChat 的跨服 plugin message 一起传输，
# 而 Minecraft 单个数据包硬上限为 32767 字节。物品 NBT 经「压缩 → 零宽编码 → UTF-8」
# 后约膨胀 12 倍，因此下面两个上限按「网络线路字节」计（已计入膨胀），务必留足余量。

# 单条消息最多嵌入多少个物品，防刷屏。
max-items-per-message: 5

# 单个物品允许占用的线路字节上限。超过则该物品降级为纯文本 [物品名]（无悬停），
# 但绝不会产生撑爆数据包的零宽数据。6000 ≈ 压缩后约 500 字节的 NBT。
max-item-wire-bytes: 6000

# 单条消息所有物品合计的线路字节预算。达到后，后续物品一律降级为纯文本。
# 硬上限 32767，此处默认 20000 为 VC/Bungee 头部与其他文本留出余量。
max-message-wire-bytes: 20000

# 日志级别: info / debug。
log-level: "info"